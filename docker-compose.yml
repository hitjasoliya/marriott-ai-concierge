services:
  postgres:
    build: ./db
    environment:
      POSTGRES_DB: marriott_hotels
      POSTGRES_USER: marriott
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marriott -d marriott_hotels"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - model_cache:/root/.cache/huggingface
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data:
  model_cache:
